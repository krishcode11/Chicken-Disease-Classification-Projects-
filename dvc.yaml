stages:
  data_ingestion:
    cmd: "python src/chicken_disease_detection/pipeline/stage_01_data_ingestion.py"
    deps:
      - src/chicken_disease_detection/pipeline/stage_01_data_ingestion.py
      - config/config.yaml
    outs:
      - artifacts/data_ingestion/Chicken-fecal-images

  prepare_base_model:
    cmd: "python src/chicken_disease_detection/pipeline/stage_02_prepare_base_model.py"
    deps:
      - src/chicken_disease_detection/pipeline/stage_02_prepare_base_model.py
      - config/config.yaml
    params:
     - IMAGE_SIZE
     - INCLUDE_TOP
     - CLASSES 
     - WEIGHTS 
     - LEARNING_RATE
    outs:
      - artifacts/prepare_base_model/base_model.h5
      - artifacts/prepare_base_model/base_model_updated.h5

  training:
    cmd: "python src/chicken_disease_detection/pipeline/stage_03_model_trainer.py"
    deps:
      - src/chicken_disease_detection/pipeline/stage_03_model_trainer.py
      - config/config.yaml

    params:
     - AUGMENTATION
     - EPOCHS
     - BATCH_SIZE
     - IMAGE_SIZE
    outs:
      - artifacts/training/model.h5

  evaluation:
    cmd: "python src/chicken_disease_detection/pipeline/stage_04_evaluation.py"
    deps:
      - src/chicken_disease_detection/pipeline/stage_04_evaluation.py
      - config/config.yaml
      - artifacts/prepare_base_model/base_model_updated.h5
      - artifacts/training/model.h5
    params:
     - IMAGE_SIZE
     - BATCH_SIZE
    metrics:
      - artifacts/evaluate/metrics.json:
          cache: false